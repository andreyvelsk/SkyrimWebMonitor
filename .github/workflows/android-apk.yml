name: Build Android APK

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Download pre-built map tiles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public
          gh release download map-assets \
            --pattern 'map-dzi.tar.gz' \
            --output map-dzi.tar.gz
          tar -xzf map-dzi.tar.gz -C public
          rm map-dzi.tar.gz
          test -f public/map-dzi/skyrim.dzi
          echo "Tiles extracted: $(find public/map-dzi -name '*.webp' | wc -l) webp files"

      - name: Build and sync Capacitor Android assets
        run: npm run cap:sync:android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: skyrim-web-monitor-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
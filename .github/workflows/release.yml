name: Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release, e.g. v0.1.1'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  resolve-ref:
    runs-on: ubuntu-latest
    outputs:
      git_ref: ${{ steps.ref.outputs.git_ref }}
      tag_name: ${{ steps.ref.outputs.tag_name }}
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "git_ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag_name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "git_ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    needs: resolve-ref
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.git_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Download pre-built map tiles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public
          gh release download map-assets \
            --pattern 'map-dzi.tar.gz' \
            --output map-dzi.tar.gz
          tar -xzf map-dzi.tar.gz -C public
          rm map-dzi.tar.gz
          test -f public/map-dzi/skyrim.dzi

      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p .ci
            echo "$KEYSTORE_BASE64" | base64 --decode > .ci/release.keystore
          fi

      - name: Build and sync Capacitor Android assets
        run: npm run cap:sync:android

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/.ci/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease

      - name: Prepare APK artifact
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p release-assets
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk "release-assets/SkyrimWebMonitor-${VERSION}-android.apk"
          else
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk "release-assets/SkyrimWebMonitor-${VERSION}-android-unsigned.apk"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release-assets/
          if-no-files-found: error

  build-electron-linux:
    needs: resolve-ref
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.git_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron Linux x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux AppImage --x64 --publish never

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux-x64
          path: dist-electron/*.AppImage
          if-no-files-found: error

  build-electron-windows:
    needs: resolve-ref
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.git_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        shell: bash
        env:
          BASE_PATH: "./"
        run: npx vite build

      - name: Build Electron Windows x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-windows-x64
          path: dist-electron/*.exe
          if-no-files-found: error

  release:
    needs: [resolve-ref, build-android, build-electron-linux, build-electron-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-ref.outputs.tag_name }}
          generate_release_notes: true
          files: release-assets/**
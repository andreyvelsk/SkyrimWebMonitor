name: Release Android APK

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release, e.g. v0.1.1'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "git_ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag_name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "git_ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.git_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Download pre-built map tiles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public
          gh release download map-assets \
            --pattern 'map-dzi.tar.gz' \
            --output map-dzi.tar.gz
          tar -xzf map-dzi.tar.gz -C public
          rm map-dzi.tar.gz
          test -f public/map-dzi/skyrim.dzi

      - name: Decode Android keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p .ci
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > .ci/release.keystore

      - name: Build and sync Capacitor Android assets
        run: npm run cap:sync:android

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/.ci/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease

      - name: Prepare release asset
        id: asset
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p release-assets
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk "release-assets/skyrim-web-monitor-${VERSION}.apk"
            echo "asset_name=skyrim-web-monitor-${VERSION}.apk" >> "$GITHUB_OUTPUT"
          else
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk "release-assets/skyrim-web-monitor-${VERSION}-unsigned.apk"
            echo "asset_name=skyrim-web-monitor-${VERSION}-unsigned.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.tag_name }}
          generate_release_notes: true
          files: release-assets/${{ steps.asset.outputs.asset_name }}
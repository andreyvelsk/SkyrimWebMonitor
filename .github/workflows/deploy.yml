name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - dev

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Serialize deploys per branch so main and dev don't race for gh-pages.
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download pre-built map tiles
        # Tiles are produced once by `.github/workflows/build-map.yml` and
        # stored in the `map-assets` release. Every deploy just pulls the
        # current tarball — we never re-run libvips on normal pushes.
        # If the release does not exist yet (first deploy ever, or someone
        # deleted it) the deploy continues without tiles and the map page
        # falls back to the single-PNG source (or a missing-asset state).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view map-assets >/dev/null 2>&1; then
            mkdir -p public
            gh release download map-assets \
              --pattern 'map-dzi.tar.gz' \
              --output map-dzi.tar.gz
            tar -xzf map-dzi.tar.gz -C public
            rm map-dzi.tar.gz
            echo "Tiles extracted: $(find public/map-dzi -name '*.webp' | wc -l) webp files"
          else
            echo "::warning::No 'map-assets' release found — building without map tiles. Run the 'Build map tiles' workflow first."
          fi

      - name: Compute deploy paths
        id: paths
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "base_path=/SkyrimWebMonitor/" >> "$GITHUB_OUTPUT"
            echo "destination_dir=." >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/SkyrimWebMonitor/dev/" >> "$GITHUB_OUTPUT"
            echo "destination_dir=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          BASE_PATH: ${{ steps.paths.outputs.base_path }}
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          destination_dir: ${{ steps.paths.outputs.destination_dir }}
          # Preserve the other branch's deploy (main keeps /dev/, dev keeps root).
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.ref_name }} @ ${{ github.sha }}'

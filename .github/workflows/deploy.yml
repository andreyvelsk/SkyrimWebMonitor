name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - dev

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Serialize deploys per branch so main and dev don't race for gh-pages.
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute deploy paths
        id: paths
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "base_path=/SkyrimWebMonitor/" >> "$GITHUB_OUTPUT"
            echo "destination_dir=." >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/SkyrimWebMonitor/dev/" >> "$GITHUB_OUTPUT"
            echo "destination_dir=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          BASE_PATH: ${{ steps.paths.outputs.base_path }}
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          destination_dir: ${{ steps.paths.outputs.destination_dir }}
          # Preserve the other branch's deploy (main keeps /dev/, dev keeps root).
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.ref_name }} @ ${{ github.sha }}'

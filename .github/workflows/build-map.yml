name: Build map tiles

# Run this workflow manually whenever source map PNGs in public/maps/ are
# added or replaced. It downloads all PNGs from the `map-source` release,
# regenerates a Deep Zoom (DZI) tile pyramid for each one with libvips,
# packages everything as `map-dzi.tar.gz` and uploads it to the `map-assets`
# release (replacing any previous asset). The deploy workflow then pulls
# this tarball on every push.
#
# Triggered manually only — normal pushes to main/dev never re-run this.

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Git tag of the release that holds the map PNGs'
        required: false
        default: 'map-source'
      target_tag:
        description: 'Git tag of the release that will hold map-dzi.tar.gz'
        required: false
        default: 'map-assets'

permissions:
  contents: write

jobs:
  build-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-tools

      - name: Download all map PNGs from source release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p map-build/maps
          gh release download "${{ inputs.source_tag }}" \
            --pattern '*.png' \
            --dir map-build/maps
          echo "Downloaded PNGs:"
          ls -la map-build/maps/

      - name: Generate DZI pyramid for each map
        run: |
          mkdir -p map-build/map-dzi
          for png in map-build/maps/*.png; do
            name=$(basename "$png" .png)
            echo "=== Generating DZI for: ${name} ==="
            vips dzsave "$png" "map-build/map-dzi/${name}" \
              --layout dz \
              --tile-size 512 \
              --overlap 1 \
              --suffix '.webp[Q=80]'
            echo "  Tiles: $(find "map-build/map-dzi/${name}_files" -name '*.webp' | wc -l)"
          done
          echo ""
          echo "=== Summary ==="
          echo "Total tiles: $(find map-build/map-dzi -name '*.webp' | wc -l)"
          echo "Pyramid size: $(du -sh map-build/map-dzi | cut -f1)"
          ls -la map-build/map-dzi/

      - name: Package tiles
        run: |
          cd map-build
          tar -czf map-dzi.tar.gz map-dzi
          ls -la map-dzi.tar.gz

      - name: Upload to map-assets release (create if missing, replace asset)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.target_tag }}"
          # Create the release if it does not exist yet.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "Map assets" \
              --notes "Pre-built DZI tile pyramids for all maps. Regenerated automatically by .github/workflows/build-map.yml whenever source PNGs change."
          fi
          # --clobber replaces an existing asset of the same name.
          gh release upload "$TAG" map-build/map-dzi.tar.gz --clobber
